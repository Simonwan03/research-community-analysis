    .hero {
      text-align: center;
      margin-bottom: 14px;
    }

      margin: 0;
      font-size: 34px;
      line-height: 1.15;
      font-weight: 800;
      letter-spacing: -0.02em;
    }
    .hero p {
      margin: 8px 0 0;
      font-size: 16px;
      color: #4b5563;
    }
    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 18px;
      align-items: start;
    }
    .panel {
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid #e5e7eb;
      border-radius: 18px;
      box-shadow: 0 14px 36px rgba(15, 23, 42, 0.08);
      overflow: hidden;
      min-height: 920px;
    }
    .panel-head {
      padding: 18px 20px 14px;
      border-bottom: 1px solid #eef2f7;
      background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
      text-align: center;
    }
    .panel-head h2 {
      margin: 0;
      font-size: 22px;
      font-weight: 800;
    }
    .panel-head p {
      margin: 6px 0 0;
      font-size: 14px;
      color: #6b7280;
    }

      padding: 18px 20px 20px;
      overflow: auto;
      max-height: calc(920px - 86px);
    }
    .hint {
      color: #6b7280;
      font-size: 15px;
      line-height: 1.6;
      text-align: center;
      padding: 28px 12px;
    }
    .detail-title {
      margin: 0 0 6px;
      font-size: 24px;
      line-height: 1.2;
      font-weight: 800;
      text-align: center;
    }
    .detail-sub {
      margin: 0 0 16px;
      font-size: 15px;
      color: #6b7280;
      text-align: center;
    }
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 18px;
    }
    .stat {
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 12px 14px;
      text-align: center;
    }
    .stat .k {
      display: block;
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 4px;
    }
    .stat .v {
      display: block;
      font-size: 20px;
      font-weight: 800;
      color: #111827;
    }
    .authors-head {
      font-size: 18px;
      font-weight: 800;
      margin: 14px 0 12px;
      text-align: center;
    }
    .author-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      gap: 10px;
    }
    .author-item {
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      background: white;
      padding: 12px 14px;
      box-shadow: 0 3px 10px rgba(15, 23, 42, 0.04);
    }
    .author-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: baseline;
      margin-bottom: 6px;
    }
    .author-name {
      font-size: 17px;
      font-weight: 800;
      color: #111827;
    }
    .author-rank {
      font-size: 13px;
      color: #6b7280;
      font-weight: 700;
    }
    .author-meta {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      font-size: 13px;
      color: #4b5563;
    }
    .author-meta span {
      display: block;
      text-align: center;
      background: #f8fafc;
      border-radius: 10px;
      padding: 7px 8px;
    }
    .chart-card {
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid #e5e7eb;
      border-radius: 22px;
      box-shadow: 0 18px 44px rgba(15, 23, 42, 0.08);
      overflow: hidden;
      padding: 12px 12px 6px;
    }
    #chart {
      width: 100%;
      height: 920px;
    }
    @media (max-width: 1200px) {
      .layout {
        grid-template-columns: 1fr;
      }
      .panel {
        min-height: 0;
      }
      #details {
        max-height: none;
      }
    }
  </style>

5, "weighted_degree": 3}], "Wuxi Third People's Hospital": [{"author_id": "pid:28/1568-4", "name": "Zhong Zhang 0004", "orcid": "0000-0003-1349-9755", "contribution_count": 3, "overall_paper_count": 3, "weighted_degree": 3}]};
    const scopeLabel = "Selected-scope paper count";
    Plotly.newPlot('chart', figure.data, figure.layout, {
      responsive: true,
      displaylogo: false,
      toImageButtonOptions: {
        format: 'png',
        filename: 'subgraph_·_all_authors',
        scale: 2
      }
    });

    const chart = document.getElementById('chart');
    const details = document.getElementById('details');

    function formatNumber(value) {
      return new Intl.NumberFormat('en-US').format(value);
    }

    function renderDefault() {
      details.innerHTML = `
        <div class="hint">
          Select an affiliation to see its paper count, country share, and top authors.
        </div>
      `;
    }

    function renderAffiliation(point) {
      const kind = point.customdata[0];
      if (kind !== 'affiliation') {
        renderDefault();
        return;
      }

      const country = point.customdata[1];
      const affiliation = point.customdata[2];
      const paperCount = point.customdata[3];
      const globalShare = point.customdata[4];
      const countryShare = point.customdata[5];
      const authors = topAuthorsLookup[affiliation] || [];

      const authorItems = authors.length
        ? authors.map((author, index) => `
            <li class="author-item">
              <div class="author-top">
                <span class="author-name">${author.name || 'Unknown Author'}</span>
                <span class="author-rank">#${index + 1}</span>
              </div>
              <div class="author-meta">
                <span><strong>${formatNumber(author.contribution_count)}</strong><br>${scopeLabel}</span>
                <span><strong>${formatNumber(author.overall_paper_count)}</strong><br>Overall papers</span>
                <span><strong>${formatNumber(author.weighted_degree)}</strong><br>Weighted degree</span>
              </div>
            </li>
          `).join('')
        : `<div class="hint">No author details were available for this affiliation.</div>`;

      details.innerHTML = `
        <h3 class="detail-title">${affiliation}</h3>
        <p class="detail-sub">${country}</p>
        <div class="stats">
          <div class="stat">
            <span class="k">Paper Count</span>
            <span class="v">${formatNumber(paperCount)}</span>
          </div>
          <div class="stat">
            <span class="k">Global Share</span>
            <span class="v">${globalShare.toFixed(2)}%</span>
          </div>
          <div class="stat">
            <span class="k">Country Share</span>
            <span class="v">${countryShare.toFixed(2)}%</span>
          </div>
          <div class="stat">
            <span class="k">Top Authors Shown</span>
            <span class="v">${formatNumber(authors.length)}</span>
          </div>
        </div>
        <div class="authors-head">Top Authors</div>
        <ul class="author-list">${authorItems}</ul>
      `;
    }

    chart.on('plotly_click', function(event) {
      if (!event || !event.points || !event.points.length) {
        renderDefault();
        return;
      }
      renderAffiliation(event.points[0]);
    });

    renderDefault();
  </script>
