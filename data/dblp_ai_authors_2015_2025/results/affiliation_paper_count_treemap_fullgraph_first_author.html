      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 18px;
    }
    .stat {
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 12px 14px;
      text-align: center;
    }
    .stat .k {
      display: block;
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 4px;

    .stat .v {
      display: block;
      font-size: 20px;
      font-weight: 800;
      color: #111827;
    }

      font-size: 18px;
      font-weight: 800;
      margin: 14px 0 12px;
      text-align: center;

      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      gap: 10px;
    }
    .author-item {
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      background: white;
      padding: 12px 14px;
      box-shadow: 0 3px 10px rgba(15, 23, 42, 0.04);

    .author-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: baseline;
      margin-bottom: 6px;
    }
    .author-name {
      font-size: 17px;
      font-weight: 800;
      color: #111827;
    }
    .author-rank {
      font-size: 13px;
      color: #6b7280;
      font-weight: 700;
    }
    .author-meta {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      font-size: 13px;
      color: #4b5563;
    }
    .author-meta span {
      display: block;
      text-align: center;
      background: #f8fafc;
      border-radius: 10px;
      padding: 7px 8px;
    }
    .chart-card {

      border: 1px solid #e5e7eb;
      border-radius: 22px;
      box-shadow: 0 18px 44px rgba(15, 23, 42, 0.08);

      padding: 12px 12px 6px;
    }
    #chart {
      width: 100%;
      height: 920px;
    }
    @media (max-width: 1200px) {
      .layout {
        grid-template-columns: 1fr;
      }
      .panel {

ology": [{"author_id": "pid:44/8410-1", "name": "Zun Wang 0001", "orcid": "0009-0005-9502-050X", "contribution_count": 1, "overall_paper_count": 1, "weighted_degree": 10}], "Qufu Normal University": [{"author_id": "pid:08/7569", "name": "Zhengqiang Zhang", "orcid": "0000-0002-7163-7709", "contribution_count": 1, "overall_paper_count": 2, "weighted_degree": 6}], "Huawei Technologies (France)": [{"author_id": "pid:188/7759-103", "name": "Chao Wang 0103", "orcid": "0009-0003-5721-5221", "contribution_count": 1, "overall_paper_count": 1, "weighted_degree": 4}]};
    const scopeLabel = "First-author paper count";
    Plotly.newPlot('chart', figure.data, figure.layout, {
      responsive: true,
      displaylogo: false,
      toImageButtonOptions: {
        format: 'png',
        filename: 'fullgraph_·_first_author',
        scale: 2
      }
    });

    const chart = document.getElementById('chart');
    const details = document.getElementById('details');

    function formatNumber(value) {
      return new Intl.NumberFormat('en-US').format(value);
    }

    function renderDefault() {
      details.innerHTML = `
        <div class="hint">
          Select an affiliation to see its paper count, country share, and top authors.
        </div>
      `;
    }

    function renderAffiliation(point) {
      const kind = point.customdata[0];
      if (kind !== 'affiliation') {
        renderDefault();
        return;
      }

      const country = point.customdata[1];
      const affiliation = point.customdata[2];
      const paperCount = point.customdata[3];
      const globalShare = point.customdata[4];
      const countryShare = point.customdata[5];
      const authors = topAuthorsLookup[affiliation] || [];

      const authorItems = authors.length
        ? authors.map((author, index) => `
            <li class="author-item">
              <div class="author-top">
                <span class="author-name">${author.name || 'Unknown Author'}</span>
                <span class="author-rank">#${index + 1}</span>
              </div>
              <div class="author-meta">
                <span><strong>${formatNumber(author.contribution_count)}</strong><br>${scopeLabel}</span>
                <span><strong>${formatNumber(author.overall_paper_count)}</strong><br>Overall papers</span>
                <span><strong>${formatNumber(author.weighted_degree)}</strong><br>Weighted degree</span>
              </div>
            </li>
          `).join('')
        : `<div class="hint">No author details were available for this affiliation.</div>`;

      details.innerHTML = `
        <h3 class="detail-title">${affiliation}</h3>
        <p class="detail-sub">${country}</p>
        <div class="stats">
          <div class="stat">
            <span class="k">Paper Count</span>
            <span class="v">${formatNumber(paperCount)}</span>
          </div>
          <div class="stat">
            <span class="k">Global Share</span>
            <span class="v">${globalShare.toFixed(2)}%</span>
          </div>
          <div class="stat">
            <span class="k">Country Share</span>
            <span class="v">${countryShare.toFixed(2)}%</span>
          </div>
          <div class="stat">
            <span class="k">Top Authors Shown</span>
            <span class="v">${formatNumber(authors.length)}</span>
          </div>
        </div>
        <div class="authors-head">Top Authors</div>
        <ul class="author-list">${authorItems}</ul>
      `;
    }

    chart.on('plotly_click', function(event) {
      if (!event || !event.points || !event.points.length) {
        renderDefault();
        return;
      }
      renderAffiliation(event.points[0]);
    });

    renderDefault();
  </script>
